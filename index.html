<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base:      #0d0f12;
      --bg-surface:   #141720;
      --bg-card:      #1a1e28;
      --bg-hover:     #1f2432;
      --border:       rgba(255,255,255,0.07);
      --border-hi:    rgba(255,255,255,0.14);
      --accent:       #00d46a;
      --accent-dim:   rgba(0,212,106,0.11);
      --accent-glow:  rgba(0,212,106,0.22);
      --text-primary: #e8eaf0;
      --text-secondary:#8892a4;
      --text-muted:   #4e5769;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-base); color: var(--text-primary);
      font-family: var(--font-display); min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,106,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,106,0.025) 1px,transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,212,106,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1.25rem 4rem; }
    .container { width: 100%; max-width: 680px; }

    /* LANG TOGGLE */
    .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 2rem; animation: fadeUp .3s ease both; }
    .lang-toggle { display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 100px; padding: 4px; gap: 2px; }
    .lang-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: none; border-radius: 100px; padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .5px; color: var(--text-muted); cursor: pointer; transition: all .2s; }
    .lang-btn.active { background: var(--bg-card); border: 1px solid var(--border-hi); color: var(--text-primary); }
    .lang-flag { font-size: 15px; line-height: 1; }

    /* HEADER */
    header { text-align: center; margin-bottom: 2.5rem; animation: fadeUp .45s .05s ease both; }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1.5rem; }
    .logo-pill { background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 1px; padding: 4px 12px; border-radius: 100px; }
    .logo-sep { width: 1px; height: 16px; background: var(--border-hi); }
    .logo-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
    header h1 { font-size: clamp(24px,5vw,38px); font-weight: 700; line-height: 1.2; letter-spacing: -.5px; color: var(--text-primary); margin-bottom: .75rem; }
    header h1 em { font-style: normal; color: var(--accent); }
    header p { font-size: 15px; color: var(--text-secondary); font-weight: 400; max-width: 440px; margin: 0 auto; line-height: 1.6; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 2rem; animation: fadeUp .45s .1s ease both; }
    .progress-track { display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 100px; padding: 5px 7px; width: fit-content; margin: 0 auto; gap: 0; }
    .p-step { display: flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 100px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); transition: all .25s; }
    .p-step.active { background: var(--accent-dim); color: var(--accent); }
    .p-step.done   { color: var(--accent); }
    .p-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; transition: all .25s; }
    .p-step.active .p-dot, .p-step.done .p-dot { background: var(--accent); border-color: var(--accent); color: #000; }
    .p-line { width: 20px; height: 1px; background: var(--border); flex-shrink: 0; transition: background .3s; }
    .p-line.done { background: var(--accent); }

    /* QUIZ */
    .quiz-wrap { animation: fadeUp .4s .15s ease both; }
    .q-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 1rem; position: relative; overflow: hidden; }
    .q-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg,transparent,var(--accent-glow),transparent); }
    .q-num  { font-family: var(--font-mono); font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: .75rem; }
    .q-text { font-size: 19px; font-weight: 600; line-height: 1.35; color: var(--text-primary); margin-bottom: .5rem; }
    .q-hint { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.75rem; font-weight: 400; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.25rem; text-align: left; cursor: pointer; transition: all .15s ease; font-family: var(--font-display); display: flex; align-items: flex-start; gap: 12px; }
    .opt-btn:hover { background: var(--bg-hover); border-color: var(--border-hi); transform: translateY(-1px); }
    .opt-btn.selected { background: var(--accent-dim); border-color: var(--accent); }
    .opt-radio { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-hi); flex-shrink: 0; margin-top: 2px; transition: all .15s; display: flex; align-items: center; justify-content: center; }
    .opt-btn.selected .opt-radio { border-color: var(--accent); background: var(--accent); }
    .opt-radio::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #000; opacity: 0; transition: opacity .15s; }
    .opt-btn.selected .opt-radio::after { opacity: 1; }
    .opt-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
    .opt-desc  { font-size: 13px; color: var(--text-secondary); line-height: 1.4; font-weight: 400; }
    .opt-btn.selected .opt-title { color: var(--accent); }

    /* NAV */
    .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .btn-back { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 20px; font-size: 13px; font-family: var(--font-mono); color: var(--text-secondary); cursor: pointer; transition: all .15s; letter-spacing: .5px; }
    .btn-back:hover { border-color: var(--border-hi); color: var(--text-primary); }
    .btn-next { background: var(--accent); border: none; border-radius: var(--radius-md); padding: 11px 28px; font-size: 13px; font-family: var(--font-mono); font-weight: 500; color: #000; cursor: pointer; transition: all .15s; letter-spacing: .5px; margin-left: auto; }
    .btn-next:hover { background: #00f07a; transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
    .btn-next:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }

    /* RESULT */
    .result-wrap { animation: fadeUp .45s ease both; }
    .rec-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); border: 1px solid rgba(0,212,106,.3); border-radius: 100px; font-family: var(--font-mono); font-size: 11px; color: var(--accent); padding: 5px 14px; letter-spacing: .5px; margin-bottom: 1.25rem; }
    .rec-tag::before { content: '✦'; font-size: 9px; }
    .result-main { background: var(--bg-card); border: 1px solid var(--accent); border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
    .result-main::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent,var(--accent),transparent); }
    .result-glow { position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); pointer-events: none; }
    .result-name  { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -.3px; }
    .result-tag   { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .price-row    { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .price-amount { font-size: 34px; font-weight: 700; color: var(--accent); letter-spacing: -1px; font-family: var(--font-mono); }
    .price-period { font-size: 14px; color: var(--text-muted); font-weight: 400; }
    .price-note   { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 1.75rem; }
    .why-box { background: var(--bg-surface); border: 1px solid var(--border); border-left: 2px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 1rem 1.25rem; margin-bottom: 1.75rem; }
    .why-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--accent); margin-bottom: 6px; }
    .why-text  { font-size: 13px; color: var(--text-secondary); line-height: 1.65; font-weight: 400; }
    .features  { border-top: 1px solid var(--border); padding-top: 1.5rem; margin-bottom: 1.75rem; }
    .features-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 1rem; }
    .feat-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .feat-row:last-child { border-bottom: none; }
    .feat-check { width: 18px; height: 18px; border-radius: 50%; background: var(--accent-dim); border: 1px solid rgba(0,212,106,.4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .feat-check svg { width: 9px; height: 9px; }
    .feat-text { font-size: 13px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }
    .feat-sub  { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .cta-row   { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-cta { background: var(--accent); border: none; border-radius: var(--radius-md); padding: 12px 28px; font-size: 13px; font-family: var(--font-mono); font-weight: 500; color: #000; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; letter-spacing: .5px; }
    .btn-cta:hover { background: #00f07a; transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
    .btn-restart { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 22px; font-size: 13px; font-family: var(--font-mono); color: var(--text-secondary); cursor: pointer; transition: all .15s; letter-spacing: .5px; }
    .btn-restart:hover { border-color: var(--border-hi); color: var(--text-primary); }

    /* COMPARE */
    .compare-section { margin-top: .5rem; }
    .compare-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 1rem; padding: 0 .25rem; }
    .compare-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 8px; }
    .cmp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; transition: all .15s; }
    .cmp-card:hover { border-color: var(--border-hi); background: var(--bg-hover); }
    .cmp-name  { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.3; }
    .cmp-price { font-family: var(--font-mono); font-size: 15px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
    .cmp-price span { font-size: 11px; color: var(--text-muted); }
    .cmp-ideal { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    /* FOOTER */
    footer { text-align: center; margin-top: 3rem; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: .5px; line-height: 1.9; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }

    @media (max-width: 520px) {
      .page { padding: 1.5rem 1rem 3rem; }
      .q-card, .result-main { padding: 1.5rem; }
      .price-amount { font-size: 28px; }
      header h1 { font-size: 22px; }
      .p-step span { display: none; }
      .lang-btn { padding: 6px 10px; }
    }
  </style>
</head>

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let lang = 'es', answers = [], current = 0, selected = null;

function recommend() {
  const [sites, siteType, managed, validation] = answers;
  if (sites === 'subdomains') return 'wildcard';
  if (sites === 'multi')      return 'san';
  if (validation === 'ev')    return 'ev';
  if (validation === 'ov')    return 'ov';
  if (managed === 'managed')  return 'dv_managed';
  if (lang === 'pt' && managed === 'self' && siteType === 'ecommerce') return 'dv_deluxe';
  return 'dv_single';
}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.documentElement.lang = l === 'pt' ? 'pt-BR' : 'es';
  document.getElementById('btn-es').className = 'lang-btn' + (l === 'es' ? ' active' : '');
  document.getElementById('btn-pt').className = 'lang-btn' + (l === 'pt' ? ' active' : '');
  const t = T[l];
  document.getElementById('hdr-label').textContent = t.hdrLabel;
  document.getElementById('hdr-title').innerHTML   = t.hdrTitle;
  document.getElementById('hdr-sub').textContent   = t.hdrSub;
  document.getElementById('footer-text').innerHTML = t.footer;
  t.pLabels.forEach((lbl, i) => { document.getElementById('plabel-' + (i+1)).textContent = lbl; });
  answers = []; current = 0; selected = null;
  document.getElementById('result-wrap').classList.add('hidden');
  document.getElementById('result-inner').innerHTML = '';
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('quiz-wrap').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const t = T[lang], q = t.questions[current];
  document.getElementById('q-num').textContent  = q.num;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint;
  const grid = document.getElementById('q-options');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (selected === opt.id ? ' selected' : '');
    btn.innerHTML = `<div class="opt-radio"></div><div class="opt-body"><div class="opt-title">${opt.title}</div><div class="opt-desc">${opt.desc}</div></div>`;
    btn.onclick = () => selectOpt(opt.id);
    grid.appendChild(btn);
  });
  document.getElementById('btn-back').classList.toggle('hidden', current === 0);
  document.getElementById('lbl-back').textContent = t.btnBack;
  const nx = document.getElementById('btn-next');
  nx.disabled    = !selected;
  nx.textContent = current < t.questions.length - 1 ? t.btnNext : t.btnLast;
  updateProgress();
}

function selectOpt(id) { selected = id; renderQuestion(); }

function updateProgress() {
  for (let i = 1; i <= 4; i++) {
    const done = i-1 < current, active = i-1 === current;
    document.getElementById('dot-'+i).className  = 'p-step'+(active?' active':done?' done':'');
    document.getElementById('pdot-'+i).textContent = done ? '✓' : String(i);
    if (i < 4) document.getElementById('line-'+i).className = 'p-line'+(done?' done':'');
  }
}

function goNext() {
  if (!selected) return;
  answers[current] = selected;
  if (current < T[lang].questions.length - 1) { current++; selected = answers[current]||null; renderQuestion(); }
  else showResult();
}

function goBack() {
  if (current > 0) { current--; selected = answers[current]||null; renderQuestion(); }
}

function showResult() {
  document.getElementById('quiz-wrap').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  const t = T[lang], key = recommend(), cert = t.certs[key];
  const others = Object.entries(t.certs).filter(([k]) => k !== key);
  const featHtml = cert.features.map(f => `
    <div class="feat-row">
      <div class="feat-check"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5.2 4,7.5 8.5,2.5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="feat-body"><div class="feat-text">${f.text}</div>${f.sub?`<div class="feat-sub">${f.sub}</div>`:''}</div>
    </div>`).join('');
  const cmpHtml = others.map(([,c]) => `
    <div class="cmp-card">
      <div class="cmp-name">${c.name}</div>
      <div class="cmp-price">${c.price}<span>${c.period}</span></div>
      <div class="cmp-ideal">${c.ideal}</div>
    </div>`).join('');
  document.getElementById('result-inner').innerHTML = `
    <div class="rec-tag">${t.recTag}</div>
    <div class="result-main">
      <div class="result-glow"></div>
      <div class="result-name">${cert.name}</div>
      <div class="result-tag">${cert.tag}</div>
      <div class="price-row"><span class="price-amount">${cert.price}</span><span class="price-period">${cert.period}</span></div>
      <div class="price-note">${cert.priceNote}</div>
      <div class="why-box"><div class="why-label">${t.whyLabel}</div><div class="why-text">${cert.why}</div></div>
      <div class="features"><div class="features-label">${t.includes}</div>${featHtml}</div>
      <div class="cta-row">
        <a class="btn-cta" href="${cert.url}" target="_blank">${t.cta}</a>
        <button class="btn-restart" onclick="restart()">${t.restart}</button>
      </div>
    </div>
    <div class="compare-section">
      <div class="compare-title">${t.others}</div>
      <div class="compare-grid">${cmpHtml}</div>
    </div>`;
  document.getElementById('result-wrap').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart() {
  answers = []; current = 0; selected = null;
  document.getElementById('result-inner').innerHTML = '';
  document.getElementById('result-wrap').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('quiz-wrap').classList.remove('hidden');
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

setLang('es');
</script>
